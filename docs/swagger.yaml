          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      summary: Получить категорию товаров
      tags:
      - product-categories
  /product-categories/{id}:
    patch:
      consumes:
      - application/json
      description: Изменить категорию товаров (название и цену установки) в системе
      parameters:
      - description: код обновляемой категории (windows, entrance-doors, interior-doors,
