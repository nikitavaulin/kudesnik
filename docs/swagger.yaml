        in: path
        name: category_code
        required: true
        type: string
      - description: PatchProductCategory тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_product_categories_transport.PatchProductCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: обновленная категория
          schema:
            $ref: '#/definitions/internal_features_product_categories_transport.PatchProductCategoryResponse'
        "400":
