host: 127.0.0.1:5050
info:
  contact: {}
  description: Kudesnik. Windows & Doors | REST-API scheme
  title: Kudesnik API
  version: "1.0"
paths:
  /admins:
    get:
      description: Получить список админов. Доступен фильтр по типу админа (superadmin
        или manager)
      parameters:
      - description: тип получаемого админа (superadmin или manager)
        in: query
        name: admin_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: полученный список админов
          schema:
            items:
              items:
                $ref: '#/definitions/internal_features_admin_transport_http.AdminResponseDTO'
              type: array
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список админов
      tags:
      - admins
    post:
      consumes:
      - application/json
      description: Создать нового админа в системе
      parameters:
      - description: CreateAdmin тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_admin_transport_http.CreateAdminRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: успешно созданный админ
          schema:
            items:
              $ref: '#/definitions/internal_features_admin_transport_http.AdminResponseDTO'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать админа
      tags:
      - admins
  /admins/{id}:
    get:
      description: Получить админа по ID
      parameters:
      - description: ID получаемого админа
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: полученный admin
          schema:
            items:
              $ref: '#/definitions/internal_features_admin_transport_http.AdminResponseDTO'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить админа
      tags:
      - admins
    patch:
      consumes:
      - application/json
      description: Изменить почту, имя, тип админа в системе
      parameters:
      - description: ID обновляемого админа
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: PatchAdmin тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_admin_transport_http.AdminPatchRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: успешно измененный админ
          schema:
            items:
              $ref: '#/definitions/internal_features_admin_transport_http.AdminResponseDTO'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Изменить админа
      tags:
      - admins
  /admins/auth:
    post:
      consumes:
      - application/json
      description: Войти в аккаунт админа в системе
      parameters:
      - description: LoginAdmin тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_admin_transport_http.LoginAdminRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: успешно созданный токен авторизации
          schema:
            $ref: '#/definitions/internal_features_admin_transport_http.LoginAdminResponseDTO'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      summary: Атворизоваться как админ
      tags:
      - admins
  /admins/profile:
    get:
      description: Получить админа по ID из jwt после авторизации
      produces:
      - application/json
      responses:
        "200":
          description: полученный admin
          schema:
            items:
              $ref: '#/definitions/internal_features_admin_transport_http.AdminResponseDTO'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить админа
      tags:
      - admins
  /admins/role/{id}:
    patch:
      consumes:
      - application/json
      description: Изменить тип админа в системе, может только superadmin
      parameters:
      - description: ID обновляемого админа
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: PatchAdmin тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_admin_transport_http.UpdateAdminTypeRequestDTO'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Изменить роль админа
      tags:
      - admins
  /product-categories:
    get:
      description: Получить список категорий, есть пагинация.
      parameters:
      - description: лимит возвращаемых категорий
        in: query
        name: limit
        type: integer
      - description: смещение возвращаемых категорий
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: полученные категории
          schema:
            items:
              $ref: '#/definitions/internal_features_product_categories_transport.ProductCategoryDTOResponse'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
      summary: Получить список категорий
      tags:
      - product-categories
  /product-categories/{category_code}:
    get:
      description: Получить категорию товаров по коду
      parameters:
      - description: Код получаемой категории
        in: path
        name: category_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: полученная категория
          schema:
            $ref: '#/definitions/internal_features_product_categories_transport.GetProductCategoryResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_nikitavaulin_kudesnik_internal_core_transport_http_response.ErrorResponse'
        "404":
