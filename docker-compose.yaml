services:
  kudesnik:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/kudesnik/Dockerfile
    container_name: kudesnik
    environment:
      - HTTP_ADDRESS=:5050
      - HTTP_SHUTDOWN_DURATION=${HTTP_SHUTDOWN_DURATION}
      - POSTGRES_HOST=kudesnik-postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - JWT_SECRET=${JWT_SECRET}
      - LOGGER_FOLDER=/app/out/logs
      - UPLOADS_FOLDER=/uploads/products
      - PROJECT_ROOT=/app
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
      - ${PROJECT_ROOT}/uploads/products:/app/uploads/products
    ports:
      - "5050:5050"
    restart: always

  kudesnik-postgres:
    image: postgres:18.3-bookworm
    container_name: kudesnik-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  kudesnik-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: kudesnik-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:kudesnik-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.25.1-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code